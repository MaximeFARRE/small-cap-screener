name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python-semantic-release
        run: pip install python-semantic-release

      - name: Check release tags
        id: release_tags
        shell: bash
        run: |
          if git tag --list 'v*' | grep -q .; then
            echo "has_release_tags=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_release_tags=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run semantic release
        if: steps.release_tags.outputs.has_release_tags == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish

      - name: Skip semantic release (no tags found)
        if: steps.release_tags.outputs.has_release_tags != 'true'
        run: echo "No v* tags found. Create an initial tag (for example v0.1.0) to bootstrap semantic-release."
